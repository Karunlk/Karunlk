<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 490" width="100%" style="background: #0d1117; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 14px; fill: #c9d1d9;">
  <rect width="100%" height="30" fill="#161b22" rx="8" ry="8"/>
  <circle cx="20" cy="15" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="15" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="15" r="6" fill="#27c93f"/>
  <text x="375" y="20" fill="#8b949e" font-size="12" text-anchor="middle">bash — terminal</text>

  <style>
    .cmd { fill: #39FF14; font-weight: bold; visibility: hidden; animation: reveal 0.1s forwards; }
    .out { fill: #c9d1d9; visibility: hidden; animation: reveal 0.1s forwards; }
    .cursor { fill: #39FF14; animation: blink 0.8s infinite; }

    @keyframes reveal { to { visibility: visible; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Pacing Delays */
    .t1 { animation-delay: 0.2s; }
    .t2 { animation-delay: 0.5s; }
    
    .t3 { animation-delay: 0.9s; }
    .t4 { animation-delay: 1.3s; }
    
    .t5 { animation-delay: 1.8s; }
    .t6 { animation-delay: 2.1s; }
    .t7 { animation-delay: 2.3s; }
    .t8 { animation-delay: 2.5s; }
    
    .t9 { animation-delay: 3.0s; }
    .t10 { animation-delay: 3.3s; }
    .t11 { animation-delay: 3.6s; }
  </style>

  <g transform="translate(25, 30)">
    <text x="0" y="30" class="cmd t1">$ whoami</text>
    <text x="0" y="55" class="out t2">&gt; karunlk</text>

    <text x="0" y="90" class="cmd t3">$ cat about.txt</text>
    <text x="0" y="115" class="out t4">Engineering student with a growing interest in software, AI,</text>
    <text x="0" y="135" class="out t4">and building things people actually use. Spend most days deep</text>
    <text x="0" y="155" class="out t4">in coursework — the rest exploring app ideas, startups, and</text>
    <text x="0" y="175" class="out t4">new tech.</text>

    <text x="0" y="210" class="cmd t5">$ status --verbose</text>
    <text x="0" y="235" class="out t6">Learning    : DSA • Linux • Systems</text>
    <text x="0" y="255" class="out t7">Building    : Side Projects, Academic Projects &amp; club Projects</text>
    <text x="0" y="275" class="out t8">Exploring   : AI tools • FOSS • Devops • product design</text>
    <text x="0" y="295" class="out t8">Mindset     : Ready to explore new stuff, Build problem solving software, never stop learning</text>

    <text x="0" y="330" class="cmd t9">$ cat availability.txt</text>
    <text x="0" y="355" class="out t10">&gt;  open to collabs, ideas, and good conversations</text>

    <text x="0" y="395" class="cmd t11">$ <tspan class="cursor">█</tspan></text>
  </g>
</svg>

